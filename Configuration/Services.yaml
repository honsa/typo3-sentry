services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false
  # Register all classes in the extension to be available for autowiring.
  # Use the extension's PSR-4 namespace so TYPO3 can auto-register controllers and services.
  Honsa\Sentry\:
    resource: '../Classes/*'
    exclude: '../Classes/{Domain,Tests,Resources}'
  Honsa\Sentry\Log\Writer\SentryLogWriter:
    public: false

  # Controller service registration so Extbase can resolve controllers from the DI container
  Honsa\Sentry\Controller\TestController:
    public: true
